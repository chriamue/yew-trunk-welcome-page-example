<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Yew Trunk Welcome Page Example</title>
        <link rel="icon" href="/yew-trunk-welcome-page-example/p/favicon-e7ed482c1ef3a4cb.png" integrity="sha384&#x2D;eBgMBmKLtuAGzPzFI&#x2B;&#x2B;F3F3ha2R6U&#x2F;UKXnPC&#x2B;nMB80TQJOw3ezx66wi&#x2B;vxfBo89x"/>

        <!-- Link to load the main app (fat app) -->
        

        <!-- Link to load the welcome page app -->
        
<script type="module" nonce="NpGz/ogFaYOnKXi1uD+uzQ==">
import init, * as bindings from '/yew-trunk-welcome-page-example/p/welcome-fc5e43288f3e0579.js';
const wasm = await init('/yew-trunk-welcome-page-example/p/welcome-fc5e43288f3e0579_bg.wasm');


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
        <base href="/yew-trunk-welcome-page-example/p/" />
    
<link rel="modulepreload" href="/yew-trunk-welcome-page-example/p/welcome-fc5e43288f3e0579.js" crossorigin=anonymous integrity="sha384-c6Rg+LfCCKRTZr+DhAlzjpTMWZUCp+K8adUS6T4nGNCCLUTj02NtPn6mGTHngMn7">
<link rel="preload" href="/yew-trunk-welcome-page-example/p/welcome-fc5e43288f3e0579_bg.wasm" crossorigin=anonymous integrity="sha384-1haTphO+8omcOfIuVnTLpLu9Ml7H7liP6qt0yS57ECGbVHnPEVm0kAzfHv56/Sdf" as="fetch" type="application/wasm"></head>
    <body>
        <!-- The welcome app will be mounted here -->
        <div id="welcome"></div>

        <script type="module">
            function getBaseUrl() {
                const baseTag = document.querySelector("base");
                return baseTag ? baseTag.getAttribute("href") : "/";
            }

            const baseUrl = getBaseUrl();
            const mainJsUrl = baseUrl + "main.js";

            async function load() {
                const { default: init, render_app } = await import(mainJsUrl);
                await init();
                window.render_app = render_app;
                console.log(
                    "WASM module initialized and render_app function exposed globally",
                );
            }

            load();
        </script>
    </body>
</html>
