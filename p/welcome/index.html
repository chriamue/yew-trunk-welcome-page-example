<html>
    <head>
        <meta charset="utf-8" />

        <!-- Link to load the main app (fat app) -->
        

        <!-- Link to load the welcome page app -->
        
<script type="module" nonce="6k01OQzn/Lguvq1ryKtrfw==">
import init, * as bindings from '/yew-trunk-welcome-page-example/welcome-fc5e43288f3e0579.js';
const wasm = await init('/yew-trunk-welcome-page-example/welcome-fc5e43288f3e0579_bg.wasm');


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
        <base href="/yew-trunk-welcome-page-example/" />
    
<link rel="modulepreload" href="/yew-trunk-welcome-page-example/welcome-fc5e43288f3e0579.js" crossorigin=anonymous integrity="sha384-c6Rg+LfCCKRTZr+DhAlzjpTMWZUCp+K8adUS6T4nGNCCLUTj02NtPn6mGTHngMn7">
<link rel="preload" href="/yew-trunk-welcome-page-example/welcome-fc5e43288f3e0579_bg.wasm" crossorigin=anonymous integrity="sha384-1haTphO+8omcOfIuVnTLpLu9Ml7H7liP6qt0yS57ECGbVHnPEVm0kAzfHv56/Sdf" as="fetch" type="application/wasm"></head>
    <body>
        <!-- The welcome app will be mounted here -->
        <div id="welcome"></div>

        <script>
            // Function to get the base URL from the <base> tag
            function getBaseUrl() {
                const baseTag = document.querySelector("base");
                return baseTag ? baseTag.getAttribute("href") : "/";
            }

            // Function to load main.js
            function loadMainJs() {
                return new Promise((resolve, reject) => {
                    const script = document.createElement("script");
                    const basePath = getBaseUrl();
                    console.log("Loading main.js from:", `${basePath}main.js`);
                    script.src = `${basePath}main.js`;
                    script.onload = resolve;
                    script.onerror = reject;
                    document.body.appendChild(script);
                });
            }

            // Function to initialize the main app
            async function initializeMainApp() {
                try {
                    await loadMainJs();
                    console.log("main.js loaded successfully");

                    // Wait for the wasm_bindgen global to be available
                    while (!window.wasmBindings) {
                        await new Promise((resolve) => setTimeout(resolve, 50));
                    }

                    // Initialize the WASM module
                    const basePath = getBaseUrl();
                    await wasm_bindgen(`${basePath}main_bg.wasm`);
                    console.log("WASM module initialized");

                    // Expose the render_app function globally
                    window.render_app = wasm_bindgen.render_app;
                    console.log("render_app function exposed globally");
                } catch (error) {
                    console.error("Error initializing main app:", error);
                }
            }

            // Call the initialization function
            initializeMainApp();
        </script>
    </body>
</html>
